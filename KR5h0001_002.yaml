front:
  text: 太上中道妙法蓮華經卷之二
  hash: sha256:2f882bc25b733c89593c38ecabe706e20a2411c3ed64729e3de547e1b595371b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0001_HFL_002-001a, image: hfl/1058/1058-014.png}
body:
  text: 諸仙大道品第三爾時諸仙大道及諸仙衆吾于往時求法華經即心無倦于諸天中常持大道求其逍遙心不退散時有仙人來白我言我有大乘名曰妙法蓮華經若不遺我當為宣説諸仙大道聞言歡喜輕毁之苦乃至一切諸苦皆從所報種種因緣無有差殊是時大道即説偈曰所作業因在非為十種多報來如風疾勸莫向中過順行品第四爾時阿斯仙人勸令我故得無礙慧示我願故使之一切群迷衆生斷其貪愛除其煩惱邪淫妄語惡口兩舌嗔嫉憎怒毁辱殺生誹謗罵詈偷盜欺凌謀恨姦詐積成衍尤十不善法常行如是地獄如箭天堂莫近衆生之苦無有出輪從迷至永常沉苦海與我天衆無由得視碧落天外瓊臺紫府流金沙地絶慮之所爾時天尊端嚴自立眉放白光口出異香説逍遙之語五雲碧落談妙法蓮華經時諸天仙衆得聞是經從無量劫曾遇仙道今正是時無憂無惱自在快樂祥雲繚繞一時來迎咸皆歡喜奉辭而退太上中道妙法蓮華經卷之二
  hash: sha256:8bde6283e904c75d815008b232811eb9d21866e92c05e3f1d1ebf1ff5858c826
