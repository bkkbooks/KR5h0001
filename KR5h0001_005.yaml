body:
  text: 九幽品第九爾時元始天尊說下方一切衆生之病虔請道士于家潔飾宅宇建設壇席嚴持香燭異果名花如法供養轉此妙經一卷二卷乃至七卷即當病愈無復煩惱自然清涼快樂無量苦難永除或咒水灑病人身即得清涼人或命終即以諭言令得病人心生捨愛應以所用之物須令師尊恭對三寶前高聲唱言即當命施令得病人無常如夢免受酸楚如地獄之報此人先世布施分文全收乃至追修無非嚴潔生信敬心不以輕慢三寶聖真一切虛空出家之道心生歡喜功德全收分明後世地獄畜生因心所作千變萬化或作化生或作胎卯受生受業隨其功德一分不及二分乃至百千萬倍皆不能及如是轉多福報隨故受生受業受皆如是群化品第十爾時妙行真人上白天尊曰我當勸化一切衆生速得成仙即說偈曰讚諸上妙經百寶莊紋綵施諸名果花伎樂洞章歌持幡復圍繞與多供養心嚴持異寶珍無非獻尊像捨弃所受用却成解脫心福德超自然如花妙勝欣千聖作此教萬慮亦忘尋諸來天仙衆總持妙法經為言思愛樂衆生業未盡業盡福還輕永斷輪回報仙樂自和鳴迎歸九臺中共說長生樂苦惱永無侵碧落真妙歌仙花共其上妙樂世間稀時復到瑶池煙霞深遠邃寂寞莫陵溪秋風薰夜月緑竹翠紫扉此時心修徹無復更輪回道路分明在塵世人自迷長逰天界外又得朝元君爾時元始天尊欲往諸天為諸天人說無極妙法蓮華經會中有一真人名曰流霞上白天尊曰我從往昔以來久乃成道未聞斯經今乃元君說此妙經心生歡喜晝夜思唯頗有衆生多受苦惱不聞妙經何名妙法我當告諸天衆共勸衆生修善男女各令傳變乃至一卷七卷及千萬卷其福無量無數乃有功德我當流布無令忘失卉木叢林大海山嶽尚有枯竭而此功德無有限量無有休息隨劫更生為度衆生不入幽冥爾時天尊歡喜善哉善哉乃有如是千萬億歲無復煩惱即時諸天仙衆各禮謝太上歡喜湧躍恭敬讚嘆稽首而退各于一面受教奉行太上中道妙法蓮華經卷之五
