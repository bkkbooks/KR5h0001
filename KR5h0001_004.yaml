front:
  text: 太上中道妙法蓮華經卷之四
  hash: sha256:6ce1c4bde96ae163ab4588c6d8184e03bb225c1c23d4ff69a13987c688d9e5a3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0001_HFL_004-001a, image: hfl/1058/1058-028.png}
body:
  text: 解脫品第七爾時元始天尊白諸天衆從昔以來未聞無上經典大千人倫我道德逍遙快樂自然乃往古時有一童子遊戲諸國多諸智惠世藝無雙或入山林或居城邑與人僕使常無解怠更生歡喜常復仙歌無嗔無怒又復尋𨔼到一小國遇一高山四顧雲霞緑水橫流爾時童子乃止此山朝餐松柏暮宿嵓谷日往月來常誦妙經時有白鶴從空而下童子與鶴成伴又經數百年間天童玉女從空來迎當會元君成道歸正是時童子無慳貪嫉妬五毒之心又復成仙下逰世界除妖毒之精救度人民除其疾病當行如是爾時仙子即我身也復告天衆我觀下界人民不修十善道我當化度未成仙道在世界中不免輪回如晹艷如水聚如葩蕉如石火化人如風中燭如蕉穀芽如夢幻影如石火久住如電光常照如煩惱形今正是時諸仙成道更自思惟玉女金童遙空駕羽三山來去璚紫府碧落空歌日月光中常逰杳冥無極九品上卿真人無極上品流霞真人無極妙品左玄真人與我同生常居天界共談下方惡業衆生不修妙法終無解脫教量品第八爾時元始天尊白諸天衆譬如大海容諸小海無復盈溢今諸天衆化彼群迷是時下方衆生人民勿生懈倦日夜精勤誦無量妙經千萬億遍觀心如空更施妙術現種種變化身長萬丈頭住于天足履大海興雲致雨腳下出水頭上出火頭上出水腳下出火現如是神通皆以教化若人重病自化良醫若人枷禁自化解脫若人在于嶮路自化人引若人沒于江湖自化舟船若人遇于鬼精之害自化除魅一切排空飛龍走騎散彩璚台種種蕭歌能令天人聞之地獄停酸諸鬼之精遠藏他方爾時會中有一妙行真人即說偈曰重空天花滿即超法會來是彼天人化法雨潤長空鶴隨丹殿舞鳳鳴隱洞前一切靈空瑞無鞅數以來玉女金童侍流霞耀紫虛衆歌碧落台步虛元君勑令救衆生苦時有下方聞學道諸仙子大誓集無為持經深洞裏學術古台中現行世界外未達妙經玄不免會元君演說微妙語聞道逍遙品黃庭共所宣雨蒙乾地藥漸漸長馨香一聞真妙道永不值輪回或大小枝苗群草百般條一切諸仙子共超苦趣玄能令九幽罪化作上天仙一切諸煩惱悉令衆真靈太上中道妙法蓮華經卷之四終
