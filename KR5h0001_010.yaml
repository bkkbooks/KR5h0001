front:
  text: 太上中道妙法蓮華經卷之十
  hash: sha256:c7a1fbb8958741febc52f28e754898f93600f7bbb6fde7924d912bb30fd8c43c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0001_HFL_010-001a, image: hfl/1058/1058-088.png}
body:
  text: 廣究災祥品第十七爾時元始天尊在七寶林中演説諸大妙法時有太極真人太玄真人普法真人太乙真人定光真人妙光真人寶積真人普德真人妙行真人玄一真人惠命真人救苦真人溥度真人普平真人溥濟真人自在真人普觀真人溥心真人太虛真人太力真人東方提頭賴吒天王南方毗留勒叉天王西方毗樓博叉天王北方毗沙門天王轉輪聖王四海龍王須彌山王諸天神王大風神王大火神王大上神王大雲神王大雷神王大電神王大力神王大月神王大星神王小星神王小日神王小月神王飛天神王宫殿神王觀廟神王社稷神王各與眷屬無鞅數衆悉皆來集稽首朝禮上白天尊曰臣等昔觀天地一切世界日月星宿山川巖洞金壁土石並皆混合廓明幽默時和歲豐國安民富受生快樂苦病不興觀今俗澆民病多受貧窮夭折父子男女不忠不孝不義不仁常遭飢饉病難每加古今異殊未能曉悟敢仗慈尊廣為宣説開諭愚迷于是羅網牧獵禽獸殺害衆生慳吝財貨不能施惠輕踈父母重惜妻子無有禮義淫欲迷惑心懷嫉妬意起異端既有奉于尊經晨昏不思讀誦漏瀾損失普軸不聞天尊睿號善因豈有福祿何生此等衆生終日竟夜真司紀録每遇六齋十直三元五臘三會之辰檢刮功過紏其善惡纍積愆尤今受報應罪惡盈貫況溺苦海漂浪愛河豈獨己身受殃受苦連逮九玄纍及七祖幽司考較編入酆都萬劫受苦無有出期是時諸大真人聞如是言悉皆驚怖惟願大慈特垂救度是時天尊告曰我今為汝説此妙經濟度衆生子宜諦聽傳教世間流通讀誦塵凡若有善信學道修行持誦經典須當肅嚴衣冠不得祼露若心生别端意不清淨有諸輕慢風吹直入倒懸地獄罪苦轉加無豈可免如能念道思真或一聲二聲尚消苦厄若能善寫三十六部尊經布於世間普勸有緣士庶善信誦持是經獲福無量有能自行善行建立觀宇布設橋梁散施穀布財寶衣物損己益他恤孤愛寡心持十戒二十四戒此乃積功纍德祈福方來非今世人如是衆生恣興妖偽心生殺害偏信邪法嗜酒淫佚靡辨親踈慳貪嫉妬苟利窺圖不行布施共相爭奪不濟貧苦作諸非法廣造惡業不持戒行此等衆生心遭天譴諸惡神鬼專逐其人當令壽命短促流于貧賤五不具足于是天尊敕諸真人護持是人去住通逹無有障難是其國王后妃太子宰輔大臣萬民兆庶皆天歡喜晝夜安樂若能持心齋戒沐浴五體轉誦此法華經者百病消除千災殄散若或心生懈怠輕笑誹謗惡言妄語不信經法斯人獲無量罪報墮無間地獄若敬信諸經典者獲無量福報得生人間天上受諸快樂爾時天尊復作前義而説偈曰吾今説妙偈妙偈皆真實一切諸衆生宜當皆信受若有不信經將墮三惡道如是諸天真安有不歸道今見魔降伏稽首來迎請我演此偈言妙法正經典皈衣敬信人福惠常增厚爾時天尊諭諸真人曰汝等可于閻浮國內震旦國中五百年後遣汝行化是時世中人民無善惟行殺害壯年頭白性同畜類男女短小身長尺餘不種五穀惟食草子起處悉于草下九月九日上天降災山摧石擊四海自然枯竭一切衆生遞相殺食大施融變草木花為鋒刃衝著即死骨山血池狼籍臭穢不堪附近次有熱風神王泠風神王并諸小風神王吹其死尸聚成山嶽或一年至于十年復遭年風大王吹其諸惡散如微塵平如手掌更興大水高八十尺猶如熱湯不可附觴或經五年十年其水推出諸穢惡消泥漫大水悉成乎地小水即成溪谷水泡散生樹木之上經得小千世界還生堅硬處上處下諸餘亦爾吾當先遣金翹鳥下地遼繞擇其善惡男女或有善根厚重持此法華者當與度之免斯苦厄其有不修齋戒性耽淫欲殺盜慳貪綺言妄語惡口兩舌輕誑愚癡背親向踈誹謗聖真不敬經典罪業積深獲無量苦報死入酆都無間地嶽萬劫受苦冥冥長夜無有出期若有善信男女道俗儒流能談歌頌讚洞文琴瑟笙簫箏笛鼓鈸香花妙果供養三寶真仙聖衆者得獲無量福報是時西瞿耶尼當有此樂種種樂音晝夜六時有異獸靈禽風雲樹木悉皆供養曲音雅嚴北鬱單越一切衆生思詠正法衣食自然隨其快樂一旦命終離諸苦惱東弗于逮衆生修真善法所居廟宇華堂樂音自天尊再告衆真曰吾今界諭有諸逐人神鬼各宜內外思省乃有優仙樓比罹鬼遭失火鬼天神地神鬼山神樹神鬼五道大力鬼百怪精邪鬼吸人氣血鬼食精啖腦鬼攝人魂𩲸鬼詐人飲食鬼入人耳目鬼入人口鼻鬼啖人肝心鬼入人五臟鬼入人十指鬼入人三田鬼入人七竅鬼百日伏尸鬼瘟癀疫癘鬼頭疫肚痛鬼天瘟地瘟鬼五色心舌鬼南辰壯斗鬼如是天下十方一切諸鬼悉皆殺害其人若請善信男女能持此法華經者滅除衆鬼惡魔邪魅末劫生世之人超于大羅天宫乃有一切神王擁護是人不令中夭橫死諸餘惡鬼悉皆消滅見世安樂寢無惡夢公私遂意萬願從心如上因緣功德道備南閻浮提衆生智性慵鄙背正向邪固負聖賢評量教典損他益己諂妄慳貪殺害邪淫嫉妬良善悖逆尊親積罪彌天盈惡苦地妄失修行自形勞苦其或歲豐時歉受賤不常天道察觀鬼魔降禍有能恭敬真像崇奉教言布施出家造井濟度群情行諸十善獲福無涯况其一切衆生皆得受性安居各隨善惡淺深所報福業不等吾今示諭汝宜諦聽受持勿示非人是時諸大真人及諸天仙聖神王等衆聞此教言皆大歡喜信受奉行稽首道前奉辭而退太上中道妙法蓮華經卷之十終
