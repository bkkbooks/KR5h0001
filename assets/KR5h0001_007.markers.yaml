  - {type: variant, offset: 693, length: 1, content: 道, CK-KZ: 普會諸天仙眾大聖眞人演諸妙法時有普德妙行眞人從座而起整頓冠裳叩頭着地作禮拜跪端簡前進上白天尊言曰前蒙演說法蓮經頌靜聽受持未曾得悟臣今重白天尊我等眞人晝夜周旋往返十方無量世界教化眾生未知天地高低江河深淺日月星辰大小運度惟願天尊慈悲爲我等眞人解說是因令我等大眾心皆得聞爾時天尊告曰汝等眞人吾今爲汝分别解說汝宜諦聽善思念之所問大深二十億萬里次有香潤澤亦深二十億萬里次有金銀瑠璃硨𥓼碼碯珊瑚琥珀諸珍妙寶深四十億萬里次有金粟砂深八十億萬里次有金剛石礦深一十億萬里次有銀粟砂深百億萬里次有銀剛石礦深二百億萬里下有無極大風載其大地地不傾搖是天地之數江河深淺皆已知之天下所有一切萬物皆用於大地山林樹木江河淮濟大海小海坑圳泉池溝澗溪谷井沼川源桑叢林木諸品草藥種種香嗅色類靑黃赤白黑等皆是大地生長土石山里山大鐵圍山小鐵圍山彌樓山及金剛山須彌山如是一切諸妙寶山碧落火山諸山中山玉四寶湧生高出一切諸妙寶山皆因大地湧出珍寶等物而合成須彌山四寶湧成高出一切世間山河等爲四方南名瑠璃西名玻瓈北名碼碯東名黃金光燄照耀四方天下眾共於勝謂名四天須彌山者是四大天王護世鎭遏四方依止而住何等爲須彌山南有無量七寶宮殿去地面萬里中有天王名曰毘留勒义身長二十五里夀命八萬七千𡻕衣食自然其中亦有男女身長二十五里亦衣食自然閻浮提内一切眾生有能受持三皈九戒孝敬父母供養師長奉祀三尊無有違犯者得生其中須彌山西有無量七寶宮殿去地百萬里中有天王名曰毘樓愽义身長二十五里夀命八萬七千𡻕衣食自然閻浮提内一切眾生若能受持三皈五戒孝敬父母供養師長奉祀三尊無有違犯者得生其中須彌山北亦有無量七寶宮殿去地百萬里中有天王名曰毘沙門身長二十五里夀命八萬七千𡻕衣食自然其中亦有男女身長二十五里亦衣食自然閻浮提内一切眾生有能受持三皈五戒孝敬父母供養師長奉祀三尊無有違犯者得生其中須彌山東亦有無量七寶宮殿去地百萬里中有天王名曰提頭頼吒身長二十五里及諸男女夀命多少人身長短及諸衣食皆悉同等閻浮提内一切眾生能修善行奉持三皈五戒孝敬父母供養師長奉祀三尊無有違犯者得生其中轉輪聖王所住之處亦有無量七寶宮殿去地二百萬里爾時轉輪聖王及一切羣臣眷屬皆身長二十三里夀命二十五萬𡻕衣食自然轉輪聖王及諸王子一切皆乘七寶大轝游四天下教化一切眾生有能奉持三皈五戒修行十善不犯諸惡受持讀誦}
