  - {type: variant, offset: 702, length: 1, content: 終, CK-KZ: 寶宮殿男女身長二十五里夀命二十五萬𡻕衣食自然無所乏少須彌山上名忉利天此天第一夀命一劫其中天人身長二十五里一切皆受無量快樂衣食自然閻浮提内諸眾生眾有能奉持三皈五戒十善勤行精修供養諸仙受持誦念妙法蓮華經晝夜一心護持經戒淸淨俱足無違失者盡其夀命隨意所願得生其中其第二天夀命二劫衣食自然其中亦有男女身長二十五里受持五戒十善得生其中其第三天夀命四劫衣食自然其中亦有男女身長二十五里受持五戒十善得生其中其第四天夀命八劫衣食自然其中亦有男女身長二十五里受持五戒十善得生其中其第五天夀命一十六劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第六天夀命三十二劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第七天夀命六十四劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第八天夀命一百二十八劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第九天夀命二百五十六劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十天夀命五百一十二劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十一天夀命一千二十四劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十二天夀命二千四十八劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十三天夀命四千九十六劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十四天夀命八千一百九十二劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十五天夀命一萬劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十六天夀}
