  - {type: variant, offset: 0, length: 1634, content: 太上中道妙法蓮華經卷之八天地物像品第十五爾時元始天尊在大羅天上七寳林中普會諸天仙衆大聖眞人演諸妙法時有普德妙行真人從座而起整頓冠裳扣頭着地作禮拜跪端簡前進上白天尊言曰前蒙演說法蓮經頌靜聼受持未曾得悟臣今重白天尊我等真人晝夜周旋徃返十方無量世界教化衆生未知天地高低江河深淺日月星辰大小運度惟願天尊慈悲爲我等真人解說是因令我等大衆心皆得聞爾時天尊告曰汝等真人吾今爲汝分别解說汝宜諦聴善思念之所問大深二十億萬里次有香潤澤亦深二十億萬里次有金銀瑠璃硨𥓼碼碯珊瑚琥珀諸珍妙寳深四十億萬里次有金粟砂深八十億萬里次有金剛石礦深一十億萬里次有銀粟砂深百億萬里次有銀剛石礦深二百億萬里下有無極大風載其大地地不傾摇是天地之數江河深淺皆已知之天下所有一切萬物皆用扵大地山林樹木江河淮濟大海小海坑圳泉池溝澗溪谷井沼川源桑叢林木諸品草藥種種香嗅色類青黄赤白黑等皆是大地生長土石山里山大鐵圍山小鐵圍山彌樓山及金剛山須彌山如是一切諸妙寳山碧落火山諸山中山玉四寳湧生高出一切諸妙寳山皆因大地湧出珍寳等物而合成須彌山四寳湧成高出一切世間山河等爲四方南名瑠璃西名玻瓈北名碼碯東名黄金光燄照耀四方天下衆共扵勝謂名四天須彌山者是四大天王護世鎮遏四方依止而住何等爲須彌山南有無量七寳宫殿去地面萬里中有天王名曰昆留勒叉身長二十五里壽命八萬七千歲衣食自然其中亦有男女身長二十五里亦衣食自然閻浮提内一切衆生有能受持三皈九戒孝敬父母供養師長奉祀三尊無有違犯者得生其中須彌山西有無量七寳宫殿去地百萬里中有天王名曰昆樓愽叉身長二十五里壽命八萬七千歲衣食自然閻浮提内一切衆生若能受持三皈五戒孝敬父母供養師長奉祀三尊無有違犯者得生其中須彌山北亦有無量七寶宫殿去地百萬里中有天王名曰昆沙門身長二十五里壽命八萬七千歲衣食自然其中亦有男女身長二十五里亦衣食自然閻浮提内一切衆生有能受持三皈五戒孝敬父母供養師長奉祀三尊無有違犯者得生其中須彌山東亦有無量七寶宫殿去地百萬里中有天王名曰提頭賴吒身長二十五里及諸男女壽命多少人身長短及諸衣食皆悉同等閻浮提内一切衆生能修善行奉持三皈五戒孝敬父母供養師長奉祀三尊無有違犯者得生其中轉輪聖王所住之䖏亦有無量七寳宫殿去地二百萬里爾時轉輪聖王及一切群臣眷屬皆身長二十三里壽命二十五萬歲衣食自然轉輪聖王及諸王子一切皆乘七寳大轝逰四天下教化一切衆生有能奉持三皈五戒修行十善不犯諸惡受持讀誦妙法蓮華經隨心所願得生其中亦有無量七寳宫殿男女身長二十五里壽命二十五萬歲衣食自然無所乏少須彌山上名仞利天此天第一壽命一刼其中天人身長二十五里一切皆受無量快樂衣食自然閻浮提内諸衆生衆有能奉持三皈五戒十善勤行精修供養諸仙受持誦念妙法蓮華經晝夜一心護持經戒清淨俱足無違失者盡其壽命隨意所願得生其中其第二天壽命二刼衣食自然其中亦有男女身長二十五里受持五戒十善得生其中其第三天壽命四刼衣食自然其中亦有男女身長二十五里受持五戒十善得生其中其第四天壽命八刼衣食自然其中亦有男女身長二十五里受持五戒十善得生其中其第五天壽命一十六刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第六天壽命三十二刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第七天壽命六十四刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第八天壽命一百二十八刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第九天壽命二百五十六刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十天壽命五百一十二刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十一天壽命一千二十四刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十二天壽命二千四十八刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十三天壽命四千九十六刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十四天壽命八千一百九十二刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十五天壽命一萬刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十六天壽, CK-KZ: ''}
