body:
  text: 令汝諸大眾一切皆得聞吾今演妙法聽之勿疑惑大地皆深遠二十一萬里次有香潤澤二十萬里深其次有雜寶金銀及玻瓈硨𥓼幷碼碯瓊玖琉璃珠是諸珍寶等四十億萬里一切諸大海大海及小海江河幷溪谷藥草諸林木天下一切物皆因地而生黑山土石山及諸彌樓山鐵山大鐵圍金剛及須彌皆因此大地湧出珍寶等惟有須彌山是爲諸山王四寶共結成高出於世界何等名爲四南名爲琉璃西名爲玻瓈北名爲瑪瑙東名爲黃金故名爲四寶護世四天王皆因而止住王及諸男女二十五里身八萬七千𡻕衣食皆自然轉輪王宮闕去地二百里夀命及生身諸珍别無異爾時轉輪王乘大天寶輿游行四天下教化諸眾生能修諸善行必得生於彼衣食及年齡悉等無有異諸天上聖尊俱在須彌頂其中諸天人自然受快樂夀命於億劫衣食皆自然閻浮諸眾生有能精戒行供養諸天眞必得生於彼首以無天上及至四八天其夀命劫數轉輪而培增其中諸天人不復異衣食神通力自在無有諸障碍若有能奉持隨其心所願所有諸天人於中而止住其夀命劫數不可得思議天地各相去百萬億由旬日月於去地八十一萬里諸星相去地七十億萬里其次須彌山幷及閻浮提縱廣各三百三十六萬里西瞿耶尼廣四百十八萬北方鬱單越縱廣有六百六十四萬里淸淨無瑕穢金剛大鐵圍俱高二百萬鐵圍小山高一百二十萬大海五千里深於三千里小海千五百其水深千里大江八十里水深四十里小江廣四十深於二十里孟津廣三里深於一里半日月皆圍圓一千七百里大星百二十中星八十圍其諸小星等四十五里圍妙行眞人知天下有四時日行於三道轉輪於天中冬行於北道是故天下寒夏行於南道是故天下熱春秋行中道天下悉調和黃金水晶日白銀琉璃月諸天星宿等悉皆白銀爲水火三寶輪一千七百里
