front:
  text: 命二萬劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十七天夀命四萬劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十八天夀命八萬劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十九天夀命一十六萬劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第二十天夀命三十二萬劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第中天人神通自在身心淸淨無有障礙如諸眞人同等無異其第二十一天至有頂三十二天於中無有别異惟諸天尊眞人居之不可思議又其天地相去百萬億由旬日月去地八十億萬里須彌山高下廣三百六十萬里閻浮地里廣三百三十萬里西瞿耶尼廣四百一十八萬里北鬱單越廣六百六十四萬里東弗於逮廣五百三十二萬里金剛山及大鐵圍山並高二百萬里小鐵圍山高一百二十萬里大海廣五千里深三千里小海廣一千五百里深一千里大江廣八十里深四十里小江廣四十里深二十里孟津廣三里深一里半又諸日月皆圍一千七百里大星圍一百二十里小星圍八十里火輪水輪並圍一千七百里天下四時冬天極寒夏天極熱春秋調理何以故日行三道冬行北道夏行南道春秋行中道黃金水晶爲日白銀琉璃爲月及諸星宿悉皆白銀隨身大小以爲居住皆受快樂自在無碍黃金水晶爲日者夏天之時水晶盡退黃金正現火輪助之其須彌山有百億萬金剛皆共助熱夏行南道火山之上是故天下悉皆大熱冬天之時去其火輪黃金盡退水晶正現水輪助之冬行北道水山之上是故天下悉皆大寒月在天中照耀天下一月之中而有晦明所以者何白銀琉璃爲月琉璃隱而白銀現天下皆明過十五日漸從而轉至三十日白銀隱而琉璃現天下皆暗爾時天尊告妙行眞人曰天下一切四方眾生各有差别汝今善聽當爲汝說西瞿耶尼一切眾生身長一十里夀命一千𡻕皆受無量自在快樂不由父母胎產悉皆蓮花化生衣食自然着體隨身長大若飲食時有大寶鉢器所謂金銀琉璃硨磲碼碯珊瑚琥珀諸珍妙寶如是之鉢隨其時節自然而現百味天厨充滿其中馨香芳馥食之甘味氣力調和身體端嚴聰明智慧高才明達神通功德不可思議北鬱單越一切眾生身長二十里夀命一千𡻕雖有男女亦無淫泆男從父腋而生女從母腋而化須衣食自然而現氣力充實身體安甯無有苦病不可思議東弗於逮一切眾生身長九里夀命五百𡻕雖有耕耘郤無租賦不罹盗賊水火苦病困窮何以故閻浮提内一切眾生身形短折夀命逼促多受憂悲煩惱患難長命者夀及百𡻕短命者胎傷中天旣得受生常加凍餒蓋以父母長育自恃强壯勤身營務以自給濟性足慳貪不能自明輕慢教典罔負聖眞因是果報西瞿耶尼北鬱單越東弗于逮諸眾生等身受快樂年算增延此乃勤行精進供養師長持經淸淨功行具足因是果報得生其中如是南閻浮提一切眾生有能修諸善行捨俗出家護持經戒淸淨具足隨心所願亦生其中爾時天尊重宣此義而作頌曰汝等當善聽今爲汝分明
