seq: 9
front:
  text: 閻浮提眾生炎凉度百𡻕北鬱幷西瞿年齡千載餘東弗于逮地年登五百𡻕如是諸眾生夀命各差殊凡能奉齋戒諸眞無别異吾今說斯頌子宜信受持
  hash: sha256:a295e07aad47d4473aa9bdc6f5e5703e7f4a045ed05bf64f3d828cfa93166faf
body:
  text: 爾時元始天尊溥會諸天仙眾於七寶林中演諸妙法時有救苦眞人前進稽首上告天尊曰臣識性愚蒙幸親仙從竊聆妙理豁開顓襟敢問南閻浮提眾生苦樂不均其諸富貴貧賤夀夭之端幸望天慈特垂開悟天尊言曰善哉善哉眞人能比善諭當爲宣說是諸眾生生處勞佚福業報對有作善者有不作善者或處富貴夀福善域或處貧賤或惡因緣若香若臭無以平等譬如日月光照無偏如諸天仙眾遍知一切智慧光明眾生於六趣之中受生如其信解經典得聞正法而轉天仙智惠而無增減如其福聚得覩無上三尊惟諸眾生植性何異譬如一等埏埴而爲器用或以盛珍寶或以盛汙濁各隨所受好惡種種異用施設不同此爲一乘或二乘次及三乘若有眾生能奉三乘皈依眞道種種信解當得尸解之道次爲大仙是故我今重爲諭議何故眾生好惡差殊眾生有見日月星宿有不見日月星宿等者此理云何况諸眾生處世類以生育不識正眞先有惡行今始病生則有四種所謂風黃痰癊及成疫毒時殃至於夭折年命我今慈愍眾生興起方便爲說此經若有眾生能以勇猛精進受持不生退墮是謂良藥療除諸病於中究義漸躋正道嗜欲障除内外遠近洞然徹視我昔受度致爾悟玄方自得眼能明始達妙法識無空法令已無勝我者其義不比六通天眼天耳自知他心憶念眾生善證智惠我今能究玄妙道濟庶物蠢動微芒悉皆覆庇觀諸眾生殊無一知以暗作明以明作暗性躭嬌怠心無智惠善少惡多一如座内何以聰明遠色不見近聲不聞眾生善心惡心立行那邊其道伊邇行而不至其法昭著視而不明以何方便救度眾生眾生若欲解悟當黜聲色去其染著坐於空山思念精微離諸疑網當得神通爲其擁護卽得出家披戴朝拜三尊於此道中能思能行以此因故一切功德可以證知隨所思念上乘微理卽得究竟至其道樞諸仙伉列其有眾生少智少惠有類生盲不見善果惟作惡業未知至意煩惱迷昧行因罕積行業爲緣失其夀善富貴報以夭惡貧賤如是眾生皆如流轉中住不離樊籠難超妙道於是救苦眞人聞如是言心生憫惻恐諸眾生永沉惡趣再白天尊言臣今願爲救度使出輪迴是時天尊隱几颺言曰善哉善哉子今能如是願父母之憐赤子也施其撫育行其濟度救護眾生以言經名爲法華遍滿虛空普資仙導接引迷惑得出三界得覩上仙或有眾生先世善少惡多不别淸淨正眞惟溺貪嗔愛欲致以風黃痰癊橫雪暴寒子以此經隨方療治卽當隨瘥漸得解脫偕其至眞有明常達無明則滅若住善中如生得眼能明艷色得之玄元擺脫六塵永滅三途遂出三界不溺輪迴於三乘義中當得玄理身有光明隨方所欲名爲妙道爾時天尊重宣此義而作頌曰日月二光照平等映無偏譬如一慧星光明如日月埏塡爲器用任意各所盛珍寶幷污淨輕重各差殊善惡隨所有報對諸苦樂若有各諸法是名坐變志如有生盲者不見日月星復作如是言無有諸色類旣得於良藥煩消知色味如是等四種和合而療治至以生盲者日逐光明已無智受苦道是以痴世中如是通一切無上眞人知能奉道師者出離三界已眞人以心愍念爾有是智或深倉舍中聲色難聞彼如是各遠居他人如汝所若善若惡心汝不能知彼欲向其靈含不步不能往汝若念彼時當得神通已受若謂空閑思微幷淨志若以入空寂眞人當度世
