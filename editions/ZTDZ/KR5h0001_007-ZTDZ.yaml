front:
  text: 太上中道妙法蓮華經卷之七
  hash: sha256:01bd8c4b125272042eb6233044646e2a2e0d243f09ddf32181799c931b739977
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0001_SJB_007-340565a, image: sjb/34/340565a.png}
body:
  text: 成道歸眞品第十三爾時元始天尊眉放五色異光照見下方世界無極衆生無極神鬼無極妖邪無極善果無極不善無極造惡無極苦惱無極慳貪無極嫉妬無極邪淫無極妄語無極惡口無極兩舌無極謀害諸惡疾病遞相讎對無有休息甚可哀憫我今種種變化之道諸無極上品妙法蓮華經令得一切邪魔鬼王弃除惡毒盡捨邪心隨吾學道歸真入聖我當攝化是時天尊從始青天中與諸天真諸天神仙皆來集會聽說妙法蓮華經時有諸鬼王等盡捨邪源歸真學道異口同音共讃諸鬼等即說偈曰瞪目覷海枯今得正真子移山㧞樹能今爲大力真嗔嵐掣雷光今爲流霞仙截邪除妖惡今爲紫耀真扶衰捍厄功今爲阿斯仙今受元君勑諸仙注仙簿今受元君勑羽駕朝衆真今受元君勑凌空散之雲今受元君勑化現妙道章今受元君勑紫文得元談今受元君勑耀衆日月分今受元君勑下助國王昌今受元君勑靈山住醮壇今受元君勑仙駕伴居山今受元君勑行法救黎民今受元君勑使魔離地方今受元君勑衆真會群仙今受元君勑禁章醮杏壇不墮千萬劫永固達仙源大道無著品第十四爾時元始天尊告諸大衆我從徃古時無所慾無所繫滯乃得成聖今諸修仙學道群仙但得逍遥爲蕩除其五慾居山居廓共談妙道五千之文救彼黎民重病危厄痛苦被人埋名釘字扵靈壇社廟爲害困苦但請法士道士于家至誠轉此妙經一卷二卷乃至七卷自然咒詛消散百病俱除非横無侵家訟遠離若善信男女香花燈燭排點地輪俵散珍寳皆諸天衆真咸來護衛具陳上善勿生輕慢誹謗凌辱行敬信心或晝夜停燭或盡日供養我從無始以來未聞此經名曰妙法蓮華經未有能持若人轉誦此經病者安痊悉除鬼禍令諸仙道士廣行流佈救度人民若人毁誹世世失真貧窮下賤因苦孤獨惡病常侵妖邪尅害殃縁九祖禍及見存是時諸天仙聖及諸鬼神聞此妙法咸皆歡喜踴躍作禮信受奉行大道一切真仙稽首天尊辭謝而退太上中道妙法蓮華經卷之七終
