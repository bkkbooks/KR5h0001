front:
  text: 太上中道妙法蓮華經卷之六
  hash: sha256:8defe2026c967397f2e629abf5ce65e687e2328a2baa37974c19ce013094db52
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0001_SJB_006-340564a, image: sjb/34/340564a.png}
body:
  text: 報應品第十一爾時元始天尊說徃古時諸仙下化諸魔鬼神徧滿天下食噉人民聚集穢污徧滿山川諸仙修鍊皆被所惱腥膻氣盛遂告諸天百千聖衆久修十善咸有神通爲吾剪除天下鬼魔免食人民爾時會中有一真人名曰太一稽首白言今正是時久有此意未曾上白天尊願賜無礙斬邪之劎無爲之水剪妖神咒扵是天尊即說咒曰我持無礙咒百鬼盡消磨遠化他方外箇箇腦門破如粉碎砂石莫惱諸仙子莫食諸衆生聞吾一咒語速避遠他方海外無藏處除非地獄間永爲業鬼精不得聞妙經元君勑下鬼不得惱衆生如不依我教頭破作千分永不聞妙經是時諸鬼等即各現身瞻禮真人願賜慈悲願聽我語我爲諸鬼所因非造乃徃古時或爲生人多不信心輕慢三寳恣行貪慾常行積惡好殺衆生食肉噉血欺慢十善惡口兩舌誹謗聖真輕辱尊像偷竊供養先嘗衆味令墮鬼趣經千劫中未得輪迴生扵人道今遇真人受元君勑我等觀諸鬼神捨無間業願告真人爲我等故說此妙法蓮華經即隨修仙學道同入上真唯願真人上白元君化鬼人道品第十二爾時元君勑諸鬼王吾聞汝等造業常在人間穢污仙壇食噉腥膻吾令真人剪除諸鬼遠藏他方令諸鬼捨邪歸正隨吾學道得悟真人見聖人位習無礙惠當度群迷除伏惡魔用神通力遶圍天下山林曠野嵓谷深邃靈壇宫觀護持諸仙學道之子汝等鬼王旣受吾勑歸神仙道求學長生是時元君以偈讚曰群魔歸正道降伏諸邪鬼縱得長生樂逍遥任自然助道千萬刼恒居海上仙夜朝華清殿朝逰五嶽峰祛邪過東海收煙淨世界秉火耀虛靈移山動小功噴氣渾洞谷掩月到蓬宫是時諸鬼王等稽首長跪上白天尊曰我等自從爲鬼以來管制天下諸惡邪神無令侵害人民護諸童子天衆爲我說法名曰妙法蓮華夫學道修真之子我當助教如有天下人民所獲染病我當衛護諸仙道士轉此妙經病者必得安痊快樂魔鬼不敢來侵惡邪遠離瘴氣收威毒藥解散我常助行如此經咒勿使人民受諸苦惱令得安穩盡悟神仙學其大道達悟通玄頂禮而退太上中道妙法蓮華經卷之六
