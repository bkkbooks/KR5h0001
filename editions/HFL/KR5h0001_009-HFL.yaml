front:
  text: 太上中道妙法蓮華經卷之九杜三
  hash: sha256:f461907efe3bff1a04f8d43082fd7d47e7464140e5d2bfa25f744fab5273f863
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0001_HFL_009-001a, image: hfl/1058/1058-078.png}
body:
  text: 諭達眞空品第十六爾時元始天尊溥會諸天仙衆扵七寶林中演諸妙法時有救苦真人前進稽首上告天尊曰臣識性愚蒙幸親仙從竊聆妙理豁開顓襟敢問南閻浮提衆生苦樂不均其諸富貴貧賤壽夭之端幸望天慈特垂開悟天尊言曰善哉善哉真人能比善諭當爲宣說是諸衆生生處勞佚福業報對有作善者有不作善者或處富貴壽福善域或處貧賤或惡因遥若香若臭無以平等譬如日月光照無偏如諸天仙衆遍知一切智惠光明衆生扵六趣之中受生如其信解經典得聞正法而轉天仙智惠而無增减如其福聚得覩無上三尊惟諸衆生埴性何異譬如一等埏埴而爲器用或以盛珎寳或以盛汙觸各隨所受好惡種種異用施設不同此爲一乘或二乘次及三乘若有衆生能奉三乘皈依真道種種信解當得尸解之道次爲大仙是故我今重爲諭議何故衆生好惡差殊衆生有見日月星宿有不見日月星宿等者此理云何况諸衆生處世𩔗以生育不識正真先有惡行今始病生則有四種所謂風黄痰癊反成疫𤸚時殃至扵夭折年命我今慈愍衆生興起方便爲說此經若有衆生能以勇猛精進受持不生退墮是謂良藥療除諸病扵中究義漸躋正道似毓除障内外遠近洞然徹視我昔受度致爾悟玄方自得眼能明始達妙法識無空法令已無勝我者其義不比六通天眼天耳自知他心憶念衆生善證智惠我今能究玄妙道濟庶物蠢動微芒悉皆覆庇觀諸衆生殊無一知以暗作明以明作暗性躭嬌怠心無智惠善少惡多一如座内何以聰明遠色不見近聲不聞衆生善心惡心立行那邊其道伊邇行而不至其莫昭著視而不明以何方便救度衆生衆生若欲解悟當黜聲色去其染著坐扵空山思念精微離諸疑網當得神通爲其擁護即得出家披戴朝拜三尊扵此道中能思先行以此因故一切功德可以證知隨所思念上乘微理即得究竟至其道樞諸仙伉列其有衆生少智少惠有𩔗生盲不見善果惟作惡業未知至意煩惱迷昧行因罕積行業爲縁失其壽善富貴報以夭惡貧賤如是衆生皆如流轉中住不離樊籠難超妙道扵是救苦真人聞如是言心生憫惻恐諸衆生永沉惡趣再白天尊言臣今願爲救度使出輪廽是時天尊隱几颺言曰善哉善哉子今能如是願父母憐之赤子也施其撫育行其濟度救護衆生以言經名爲法華遍滿虛空普資仙導接引迷惑得出三界得覩上仙或有衆生先世善少惡多不别清淨正真惟溺貪嗔愛欲致以風黄痰癊横𩁿暴寒子以此經隨方療治即當隨瘥漸得解脫偕其至眞有明常達無明則滅若住善中如生得眼能明艷色得之玄元擺脫六塵永滅三途遂出三界不溺輪廽扵三乘義中當得玄理身有光明隨方所欲名爲妙道爾時天尊重宣此義而作頌曰日月二光照平等映無徧譬如一惠星光明如日月埏填爲器用任意各所盛珎寳并污淨輕重各差殊善惡隨所有報對諸苦樂若有各諸法是名坐變志如有生盲者不見日月星復作如是言無有諸色𩔗旣得扵良藥煩消知色味如是等四種和合而療治至以生盲者日逐光明已無智受苦道是以痴世中如是通一切無上真人知能奉道師者出離三界已真人以心愍念爾有是智或深倉舍中聲色難聞彼如是各遠居他人如汝所若善若惡心汝不能知彼欲向其靈含不步不能徃汝若念彼時當得神通已受若謂空閑思微并淨志若以入空寂真人當度世六度行清淨空寂即無趣衆善悉皆修諸山無别故别法各空寂四種凡諸行教化諸衆行天人亦讃說諸法皆平等一切生道智平等當自是道法天流值太上中道妙法蓮華經卷之九終
