front:
  text: 太上中道妙法蓮華經卷之一杜一
  hash: sha256:d6c74ba8fa0c29db96179dcf1af75262683a3a89a728f5dda2d60bf5ad88f2c4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0001_HFL_001-001a, image: hfl/1058/1058-004.png}
body:
  text: 元始大羅品第一爾時元始天尊昔扵大羅天上廣化天宫會諸天仙衆說十極解脫五無間罪是時會中有一真人名曰左玄長跪道前上白天尊何名十極五無間罪扵是天尊說偈譛曰無極滿空界衆生未曾聞我會諸仙衆廣演解脫門停酸地獄苦今悟天仙人歌謡從空下日月耀瓊台聞仙解脫語真仙大喜悅即便隨仙人供給扵所須採薪及菓蓏隨時供給與情存妙法衆勤心無懈倦普爲諸衆生勤修扵大法願保爲己身及以五谷藥故爲大國王所求護此法遂致得成仙今故爲汝說爾時天尊告諸仙衆吾今爲汝說此妙法無量衆生皆得解脫即時諸天仙衆悉以散花末味上妙寳香旃檩沉水卧具衣服瓔珞幢幡寳盖伎樂空歌頌礼供養七寳瑶臺十方仙聖無量衆生皈依仙道是時元始天尊而說偈言我爲天主惟住天界在無爲中尚爲法來諸人云何不勤爲法今法幽玄故來至此爲坐諸仙以神通力如清淨地蓮華裝嚴其寳樹下諸璚瑶臺身出妙香徧諸天界衆生如熏喜不自勝譬如大風吹小樹枝以是方便令流行法告諸大仙我隱空後誰能護持讀說斯經今扵尊前自說誓願其左玄眞雖久隱空而獅子吼元始天尊以大誓願所集化身當知此意及與我身所集化身當知此意諸眞子等誰能護法則爲供養我與左玄共行妙法此之右玄逰扵十方爲是經故亦復供養諸來化仙粧嚴光飾諸世界中若說此經則爲見存名諸仙化及諸仙衆大廣化品第二於是會中諸善男子各聽思唯此爲難事宜發大願諸爲經典數無鞅衆雖說此等未足爲難若接須彌擲扵他方亦未爲難若以足指動諸仙界遠擲他國亦未爲難若立有頂爲衆演說扵惡世中能說此經是則爲難假使有人手持虛空而以逰行亦未爲難扵我歸天若自書持若使人書是則爲難若以大地置足甲上昇扵梵天亦未爲難諸仙化後於惡世中暫讀此經是則爲難諸仙化後若持此經爲一人說是則爲難若持八萬四千法藏三十六部尊經爲人演說令諸聽者神通自在雖能如是亦未爲難諸仙化後聽受此經問其義趣是則爲難若人說法令千萬億無鞅無數亦未爲難諸仙化後若能奉持如斯經典是則爲難我作仙道無鞅數國從始至今廣說諸經而扵其中此經第一若人受持是則踊躍即隨仙人共給所須採菓汲水摘蓏拾薪修設齋食乃至己身而爲床坐身心無倦于時奉持經於千歲爲求法故精勤給事令無所乏爾時大道而說偈言我爲法故身爲僕使曾無倦心今得仙故神通自然誘諭群迷莫作惡因果報皆至時有仙女名曰金童扵衆會前白諸天衆人間善惡皆隨心造地獄畜生胎卵濕化所報因縁若得成仙即離三途度脫群迷無鞅數衆皆來集會俱說是經譬如有人修於善果善業咸臻若作惡道業因自現或作駱駝負重之苦或作蟒蛇積毒之苦或作魚鱉漂淪之苦或作飛禽羅網之苦或作猪狗污賤之苦或作驢騾償債之苦或作牛畜佈種之苦或作賤類仙身諸善男子扵我化後謹能受持讀誦此經今對道前自說誓言此經難持若暫持者我則歡喜諸仙亦然如是之人天道所歎是則勇猛是名修真行慈之行則爲疾得諸仙道果能於來世持念此經是真神仙住淳善地大道所化能解其義是諸天人其間之眼於恐畏世能雖爲說一切諸仙皆應供養太上中道妙法蓮華經卷之一
