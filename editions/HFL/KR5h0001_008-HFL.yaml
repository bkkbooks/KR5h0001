front:
  text: 太上中道妙法蓮華經卷之八
  hash: sha256:9e30d22a5d0743bf4d1c9807ac2ee068a5ee4ac796cd963fe4b6ec75d1156552
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0001_HFL_008-001a, image: hfl/1058/1058-052.png}
body:
  text: 天地物像品第十五爾時元始天尊在大羅天上七寳林中普會諸天仙衆大聖眞人演諸妙法時有普德妙行真人從座而起整頓冠裳扣頭着地作禮拜跪端簡前進上白天尊言曰前蒙演說法蓮經頌靜聼受持未曾得悟臣今重白天尊我等真人晝夜周旋徃返十方無量世界教化衆生未知天地高低江河深淺日月星辰大小運度惟願天尊慈悲爲我等真人解說是因令我等大衆心皆得聞爾時天尊告曰汝等真人吾今爲汝分别解說汝宜諦聴善思念之所問大深二十億萬里次有香潤澤亦深二十億萬里次有金銀瑠璃硨𥓼碼碯珊瑚琥珀諸珍妙寳深四十億萬里次有金粟砂深八十億萬里次有金剛石礦深一十億萬里次有銀粟砂深百億萬里次有銀剛石礦深二百億萬里下有無極大風載其大地地不傾摇是天地之數江河深淺皆已知之天下所有一切萬物皆用扵大地山林樹木江河淮濟大海小海坑圳泉池溝澗溪谷井沼川源桑叢林木諸品草藥種種香嗅色類青黄赤白黑等皆是大地生長土石山里山大鐵圍山小鐵圍山彌樓山及金剛山須彌山如是一切諸妙寳山碧落火山諸山中山玉四寳湧生高出一切諸妙寳山皆因大地湧出珍寳等物而合成須彌山四寳湧成高出一切世間山河等爲四方南名瑠璃西名玻瓈北名碼碯東名黄金光燄照耀四方天下衆共扵勝謂名四天須彌山者是四大天王護世鎮遏四方依止而住何等爲須彌山南有無量七寳宫殿去地面萬里中有天王名曰昆留勒叉身長二十五里壽命八萬七千歲衣食自然其中亦有男女身長二十五里亦衣食自然閻浮提内一切衆生有能受持三皈九戒孝敬父母供養師長奉祀三尊無有違犯者得生其中須彌山西有無量七寳宫殿去地百萬里中有天王名曰昆樓愽叉身長二十五里壽命八萬七千歲衣食自然閻浮提内一切衆生若能受持三皈五戒孝敬父母供養師長奉祀三尊無有違犯者得生其中須彌山北亦有無量七寶宫殿去地百萬里中有天王名曰昆沙門身長二十五里壽命八萬七千歲衣食自然其中亦有男女身長二十五里亦衣食自然閻浮提内一切衆生有能受持三皈五戒孝敬父母供養師長奉祀三尊無有違犯者得生其中須彌山東亦有無量七寶宫殿去地百萬里中有天王名曰提頭賴吒身長二十五里及諸男女壽命多少人身長短及諸衣食皆悉同等閻浮提内一切衆生能修善行奉持三皈五戒孝敬父母供養師長奉祀三尊無有違犯者得生其中轉輪聖王所住之䖏亦有無量七寳宫殿去地二百萬里爾時轉輪聖王及一切群臣眷屬皆身長二十三里壽命二十五萬歲衣食自然轉輪聖王及諸王子一切皆乘七寳大轝逰四天下教化一切衆生有能奉持三皈五戒修行十善不犯諸惡受持讀誦妙法蓮華經隨心所願得生其中亦有無量七寳宫殿男女身長二十五里壽命二十五萬歲衣食自然無所乏少須彌山上名仞利天此天第一壽命一刼其中天人身長二十五里一切皆受無量快樂衣食自然閻浮提内諸衆生衆有能奉持三皈五戒十善勤行精修供養諸仙受持誦念妙法蓮華經晝夜一心護持經戒清淨俱足無違失者盡其壽命隨意所願得生其中其第二天壽命二刼衣食自然其中亦有男女身長二十五里受持五戒十善得生其中其第三天壽命四刼衣食自然其中亦有男女身長二十五里受持五戒十善得生其中其第四天壽命八刼衣食自然其中亦有男女身長二十五里受持五戒十善得生其中其第五天壽命一十六刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第六天壽命三十二刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第七天壽命六十四刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第八天壽命一百二十八刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第九天壽命二百五十六刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十天壽命五百一十二刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十一天壽命一千二十四刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十二天壽命二千四十八刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十三天壽命四千九十六刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十四天壽命八千一百九十二刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十五天壽命一萬刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十六天壽命二萬刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十七天壽命四萬刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十八天壽命八萬刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十九天壽命一十六萬刼衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第二十天壽命三十二萬劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第中天人神通自在身心清淨無有障礙如諸真人同等無異其第二十一天至有頂三十二天扵中無有别異惟諸天尊真人居之不可思議又其天地相去百萬億由旬日月去地八十億萬里須彌山高下廣三百六十萬里閻浮地里廣三百三十萬里西瞿耶尼廣四百一十八萬里北鬱單越廣六百六十四萬里東弗于逮廣五百三十二萬里金剛山及大鐵圍山並高二百萬里小鐵圍山高一百二十萬里大海廣五千里深三千里小海廣一千五百里深一千里大江廣八十里深四十里小江廣四十里深二十里孟津廣三里深一里半又諸日月皆圍一千七百里大星圍一百二十里小星圍八十里火輪水輪並圍一千七百里天下四時冬天極寒夏天極熱春秋調理何以故日行三道冬行北道夏行南道春秋行中道黄金水晶爲日白銀琉璃爲月及諸星宿悉皆白銀隨身大小以爲居住皆受快樂自在無碍黄金水銀爲日者夏天之時水晶盡退黄金正現火輪助之其須彌山有百億萬金剛皆共助熱夏行南道火山之上是故天下悉皆大熱冬天之時去其火輪黄金盡退水晶正現水輪助之冬行北道水山之上是故天下悉皆大寒月在天中照耀天下一月之中而有晦明所以者何白銀琉璃爲月琉璃隱而白銀現天下皆明過十五日漸從而轉至三十日白銀隱而琉璃現天下皆暗爾時天尊告妙行真人曰天下一切四方衆生各有差别汝今善聽當爲汝說西瞿耶尼一切衆生身長一十里壽命一千歲皆受無量自在快樂不由父母胎産悉皆蓮花化生衣食自然着體隨身長大若飲食時有大寳鉢器所謂金銀琉璃硨磲碼碯珊瑚琥珀諸珎妙寳如是之鉢隨其時節自然而現百味天厨充滿其中馨香芳馥食之甘味氣力調和身體端嚴聦明智惠高才明達神通功德不可思議北欝單越一切衆生身長二十里壽命一千歲雖有男女亦無淫佚男從父腋而生女從母腋而化須衣食自然而現氣力充實身體安寧無有苦病不可思議東弗于逮一切衆生身長九里壽命五百歲雖有耕耘即無王賦不罹盗賊水火苦病困窮何以故閻浮提内一切衆生身形短折壽命逼促多受憂悲煩惱患難長命者壽及百歲短命者胎傷中夭旣得受生常加凍餒盖以父母長育自恃强壯勤身營務以自給濟性足慳貪不能自明輕慢教典罔負聖真因是果報西瞿耶尼北欝單越東弗于逮諸衆生等身受快樂年筭增延此乃勤行精進供養師長持經清淨功行具足因是果報得生其中如是南閻浮提一切衆生有能修諸善行捨俗出家護詩經戒清淨具足隨心所願亦生其中爾時天尊重宣此義而作頌曰汝等當善聽今爲汝分明令汝諸大衆一切皆得聞吾今演妙法聽之勿疑惑大地皆深遠二十一萬里次有香潤澤二十萬里深其次有雜寳金銀及玻瓈硨磲并碼碯瓊玖琉璃珠是諸珍寳等四十億萬里一切諸大海大海及小海江河并溪谷藥草諸林木天下一切物皆因地而生黑山土石山及諸彌樓山鐵山大鐵圍金剛及須彌皆因此大地湧出珎寳等惟有須彌山是爲諸山王四寳共結成高出扵世界何等名爲四南名爲琉璃西名爲玻瓈北名爲瑪瑙東名爲黄金故名爲四寳護世四天王皆因而止住王及諸男女三十五里身八萬七千歲衣食皆自然轉輪王宫闕去地二百里壽命及生身諸珎别無異爾時轉輪王乘大天寳輿遊行四天下教化諸衆生能修諸善行必得生扵彼衣食及年齡悉等無有異諸天上聖尊俱在須彌頂其中諸天人自然受快樂壽命扵億刼衣食皆自然閻浮諸衆生有能精戒行供養諸天真必得生於彼首以無天上及至四八天其壽命刼數轉輪而培增其中諸天人不復異衣食神通力自在無有諸障碍若有能奉持隨其心所願所有諸天人於中而止住其壽命刼數不可得思議天地各相去百萬億由旬日月扵去地八十一萬里諸星相去地七十億萬里其次須彌山并及閻浮提縱廣各三百三十六萬里西瞿耶尼廣四百十八萬北方鬱單越縱廣有六百六十四百萬清淨無瑕穢金剛大鐵圍俱高二百萬鐵圍小山高一百二十萬大海五千里深於三千里小海千五百其水深千里大江八十里水深四十里小江廣四十深於二十里孟津廣三里深於一里半日月皆圍圓一千七百里大星百二十中星八十圍其諸小星等四十五里圍妙行真人知天下有四時日行扵三道轉輪扵天中冬行扵北道是故天下寒夏行扵南道是故天下熱春秋行中道天下悉調和黄金水晶日白銀琉璃月諸天星宿等悉皆白銀爲水火三寳輪一千七百里閻浮提衆生炎涼度百歲北欝并西瞿年齡千載餘東弗于逮地年登五百歲如是諸衆生壽命各差殊凡能奉齋戒諸真無别異吾今說斯頌子宜信受持太上中道妙法蓮華經卷之八終
