canonical_identifier: bkk:krp/KR5h0001/YP-C/v1/juan/3
seq: 3
front:
  text: 如是地獄如箭天堂莫近眾生之苦無有出輪從迷至永常沉苦海與我天眾無由得視碧落天外璚臺紫府流金沙地絕慮之所爾時天尊端嚴自立眉放白光口出異香說逍遙之語五雲碧落談妙法蓮華經時諸天仙眾得聞是經從無量刧曾遇仙道今正是時無憂無惱自在快樂祥雲繚繞一時來迎咸皆歡喜奉辭而退順行正品第五爾時元始天尊集會天仙及諸化仙從無鞅世界而來各禮天尊於一面坐時有左玄眞人上白天尊曰惟願天尊大慈愍我等故說斯妙經今乃化仙皆來集會時久行者願得天尊慈悲所諭是時天尊告諸天尊眾諸天仙眾我成道以來未聞斯經上得逍遙今汝聽受願超我故卽說偈曰我當化度救彼三途一切諸仙
  hash: sha256:4b5bcedd78797d22a42d53eb10703d2eb50cc60296b1b8c133cb29a23e509545
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0001_YP-C_03diji-08-0004b, image: JY019/03diji-08-0004b.png}
body:
  text: 盡成道故千萬億夕住虛空所化出瓊臺碧落雲衢天歌自然鸞鳴鳳舞化出異香雲間結輿游遶世界停地獄苦無憂無惱如飲甘露大道所生神仙扶助令使解脫邪心頓悟免被輪迴永絕三途行平等心我唯濟苦六根常淨千邪當去無碍智慧長生自布道垂遠喻眾生親負於解脫時達神仙路淸淨快樂行慈法雨救眾生病恆歌妙語垂喻品第六爾時元始天尊白諸天眾說海空之義使無鞅數眾神通自然我說黃庭左玄當我我說幽玄右玄解我我說無爲尹喜爲侣我說長生齊天命住散落人間爲大慈父我有妙經能令眾生得超九品是時天尊以偈讚曰或有諸仙子住於深洞中修心鍊丹藥以求大道玄或有諸仙子處如塵世界化現無礙惠以求大道玄或有諸仙子現行染妙法救於眾生者以求大道玄或有諸仙子坐於東海隅千萬餘年中以求大道玄或有諸仙子多聞智過人强識於文字以求大道玄或有諸仙子休糧服松柏彈琴氷心火以求大道玄或有諸仙子持劍於荒郊降伏十種魔以求大道玄或有諸仙子符禁咒術功除殃遣鬼魔以求大道玄或有諸仙子海上駕靑鸞度運歸仙道以求大道玄或有諸仙子持經念洞章救彼凡夫者以求大道玄是時元始天尊說偈讚已於是會中有無極天尊我聞斯經九玄七祖咸昇天宮何况一切受苦眾生豈不超然乃有五無間無鞅之苦如赫日消霜咸使盲聾便獲聰明咸使貧窮便獲富貴咸使顚狂便獲眞性咸使下貧便獲高遷咸使重病便獲痊瘥咸使喑啞便獲能言咸使目盲便獲光明咸使蹇足便獲能行咸使孕婦便獲身輕咸使淫慾便獲離淫咸使愚痴便獲離痴咸使瞋恚便獲離瞋咸使五濁便獲男形咸使死屍便獲生成咸使精邪便獲遠奔咸使虛耗便獲豐足咸使盗賊便獲慈悲咸使饑饉便獲飽滿咸使火災便獲息熖咸使水災便獲平陸是時天尊告諸天仙眾我昔求於大道時有五方人來各說空界異口同音我指大道聲振十方鬼神皆驚又聞上界往昔天人所說大道變現無窮乃有眾生求其大道我當助道速得成就爾時大眾動自然音樂於空中來迎能修道果無復憎愛愚痴驕慢多嗔恚怒輕觸邪淫忘言惡口行無礙惠濟貧救苦時有長夀眞人上白天尊言願我早成大道爾時天尊爲我說法從生以來未聞斯經以得淸淨今願天尊重爲
  hash: sha256:e275e356f78d3c0171cfb87231814929ea270a2b144a771d56963bf0ba269506
