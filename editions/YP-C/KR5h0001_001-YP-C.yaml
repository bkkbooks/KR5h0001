front:
  text: 重刊道藏輯要太上中道妙法蓮華經
  hash: sha256:d337a949ae21a22a055eced01ab630cb2cb9b55fd1e4013a7e6b7739300202b8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0001_YP-C_03diji-08-0001a, image: JY019/03diji-08-0001a.png}
body:
  text: 元始大羅品第一爾時元始天尊昔於大羅天上廣化天宮會諸天仙眾說十極解脫五無間罪是時會中有一眞人名曰左玄長跪道前上白天尊何名十極五無間罪於是天尊說偈讚曰無極滿空界眾生未曾聞我會諸仙眾廣演解脫門停除地獄苦今悟天仙人歌謡從空下日月耀瓊臺聞仙解脫語眞仙大喜悅卽便隨仙人供給於所須採薪及菓蓏隨時供給與情存妙法眾勤心無懈倦普爲諸眾生勤修於大法願保爲已身及以五谷藥故爲大國王所求護此法遂致得成仙今故爲汝說爾時天尊告諸仙眾吾今爲汝說此妙法無量眾生皆得解脫卽時諸天仙眾悉以散花末味上妙寶香旃檀沉水臥具衣服瓔珞幢幡寶葢伎樂空歌頌禮供養七寶瑤臺十方仙聖無量眾生皈依仙道是時元始天尊而說偈言我爲天主惟住天界在無爲中尙爲法來諸人云何不勤爲法今法幽玄故來至此爲坐諸仙以神通力如淸淨地蓮華莊嚴其寶樹下諸璚瑤臺身出妙香徧諸天界眾生如熏喜不自勝譬如大風吹小樹枝以是方便令流行法告諸大仙我隱空後誰能護持讀說斯經今於尊前自說誓願其左玄眞雖久隱空而獅子吼元始天尊以大誓願所集化身當知此意及與我身所集化身當知此意諸眞子等誰能護法則爲供養我與左玄共行妙法此之右玄游於十方爲是經故亦復供養諸來化仙粧嚴光飾諸世界中若說此經則爲見存名諸仙化及諸仙眾大廣化品第二於是會中諸善男子各聽思唯此爲難事宜發大願諸爲經典數無鞅眾雖說此等未足爲難若接須彌擲於他方亦未爲難若以足指動諸仙界遠擲他國亦未爲難若立有頂爲眾演說於惡世中能說此經是則爲難假使有人手持虛空而以游行亦未爲難於我歸天若自書持若使人書是則爲難若以大地置足甲上昇於梵天亦未爲難諸仙化後於惡世中暫讀此經是則爲難諸仙化後若持此經爲一人說是則爲難若持八萬四千法藏三十六部尊經爲人演說令諸聽者神通自在雖能如是亦未爲難諸仙化後聽受此經問其義趣是則爲難若人說法令千萬億無鞅無數亦未爲難諸仙化後若能奉持如斯經典是則爲難我作仙道無鞅數國從始至今廣說諸經而於其中此經第一若人受持是則踊躍卽隨仙人共給所須採菓汲水摘蓏拾薪修設齋食乃至己身而爲床坐身心無倦於時奉持經於千歲爲求法故精勤給事令無所乏爾時大道而說偈言我爲法故身爲僕使曾無倦心今得仙故神通自然誘諭羣迷莫作惡因果報皆至時有仙女名曰金童於眾會前白諸天眾人間善惡皆隨心造地獄畜生胎卵濕化所報因緣若得成仙卽離三途度脫羣迷無鞅數眾皆來集會俱說是經譬如有人修於善果善業咸臻若作惡道業因自現或作
  hash: sha256:b9da8925c5c8a8e074c20f5b325ccf53be34b847598cbf5eb6d6544b82a2e629
