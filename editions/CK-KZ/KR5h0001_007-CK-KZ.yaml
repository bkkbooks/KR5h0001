seq: 7
front:
  text: 毒藥解散我常助行如此經咒勿使人民受諸苦惱令得安穩盡悟神仙學其大道達悟通玄頂禮而退
  hash: sha256:8b3eeaacbb067c21cfbac12ebe900b3c640d66ea3bf6ada68c8d5c4399c9cfbe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0001_CK-KZ_01p013b, image: JY019/CK-KZ_JY019_01p013b.png}
body:
  text: 成道歸眞品第十三爾時元始天尊眉放五色異光照見下方世界無極眾生無極神鬼無極妖邪無極善果無極不善無極造惡無極苦惱無極慳貪無極嫉妬無極邪淫無極妄語無極惡口無極兩舌無極謀害諸惡疾病遞相讐對無有休息甚可哀憫我今種種變化之道諸無極上品妙法蓮華經令得一切邪魔鬼王弃除惡毒盡捨邪心隨吾學道歸眞入聖我當攝化是時天尊從始靑天中與諸天眞諸天神仙皆來集會聽說妙法蓮華經時有諸鬼王等盡捨邪源歸眞學道異口同音共讚諸鬼等卽說偈曰瞪目覷海枯今得正眞子移山拔樹能今爲大力眞嗔嵐掣電光今爲流霞仙截邪除妖惡今爲紫耀眞扶衰捍厄功今爲阿斯仙今受元君勅諸仙注仙簿今受元君勅羽駕朝眾眞今受元君勅凌空散紫雲今受元君勅化現妙道章今受元君勅紫文得元談今受元君勅耀眾日月分今受元君勅下助國王昌今受元君勅靈山住醮壇今受元君勅仙駕伴居山今受元君勅行法救黎民今受元君勅使魔離地方今受元君勅眾眞會羣仙今受元君勅禁章醮杏壇不墮千萬劫永固達仙源大道無著品第十四爾時元始天尊告諸大眾我從往古時無所慾無所繫滯乃得成聖今諸修仙學道羣仙但得逍遙爲蕩除其五慾居山居郭共談妙道五千之文救彼黎民重病危厄痛苦被人埋名釘字於靈壇社廟爲害困苦但請法士道士於家至誠轉此妙經一卷二卷乃至七卷自然咒詛消散百病俱除非橫無侵家訟遠離若善信男女香花燈燭排點地輪俵散珍寶偕諸天眾眞咸來護衞具陳上善勿生輕慢誹謗凌辱行敬信心或晝夜停燭或盡日供養我從無始以來未聞此經名曰妙法蓮華經未有能持若人轉誦此經病者安痊悉除鬼禍令諸仙道士廣行流佈救度人民若人毁誹世世失眞貧窮下賤困苦孤獨惡病常侵妖邪尅害殃緣九祖禍及見存是時諸天仙聖及諸鬼神聞此妙法咸皆歡喜踴躍作禮信受奉行大道一切眞仙稽首天尊辭謝而退天地物像品第十五爾時元始天尊在大羅天上七寶林中普會諸天仙眾大聖眞人演諸妙法時有普德妙行眞人從座而起整頓冠裳叩頭着地作禮拜跪端簡前進上白天尊言曰前蒙演說法蓮經頌靜聽受持未曾得悟臣今重白天尊我等眞人晝夜周旋往返十方無量世界教化眾生未知天地高低江河深淺日月星辰大小運度惟願天尊慈悲爲我等眞人解說是因令我等大眾心皆得聞爾時天尊告曰汝等眞人吾今爲汝分别解說汝宜諦聽善思念之所問大深二十億萬里次有香潤澤亦深二十億萬里次有金銀瑠璃硨𥓼碼碯珊瑚琥珀諸珍妙寶深四十億萬里次有金粟砂深八十億萬里次有金剛石礦深一十億萬里次有銀粟砂深百億萬里次有銀剛石礦深二百億萬里下有無極大風載其大地地不傾搖是天地之數江河深淺皆已知之天下所有一切萬物皆用於大地山林樹木江河淮濟大海小海坑圳泉池溝澗溪谷井沼川源桑叢林木諸品草藥種種香嗅色類靑黃赤白黑等皆是大地生長土石山里山大鐵圍山小鐵圍山彌樓山及金剛山須彌山如是一切諸妙寶山碧落火山諸山中山玉四寶湧生高出一切諸妙寶山皆因大地湧出珍寶等物而合成須彌山四寶湧成高出一切世間山河等爲四方南名瑠璃西名玻瓈北名碼碯東名黃金光燄照耀四方天下眾共於勝謂名四天須彌山者是四大天王護世鎭遏四方依止而住何等爲須彌山南有無量七寶宮殿去地面萬里中有天王名曰毘留勒义身長二十五里夀命八萬七千𡻕衣食自然其中亦有男女身長二十五里亦衣食自然閻浮提内一切眾生有能受持三皈九戒孝敬父母供養師長奉祀三尊無有違犯者得生其中須彌山西有無量七寶宮殿去地百萬里中有天王名曰毘樓愽义身長二十五里夀命八萬七千𡻕衣食自然閻浮提内一切眾生若能受持三皈五戒孝敬父母供養師長奉祀三尊無有違犯者得生其中須彌山北亦有無量七寶宮殿去地百萬里中有天王名曰毘沙門身長二十五里夀命八萬七千𡻕衣食自然其中亦有男女身長二十五里亦衣食自然閻浮提内一切眾生有能受持三皈五戒孝敬父母供養師長奉祀三尊無有違犯者得生其中須彌山東亦有無量七寶宮殿去地百萬里中有天王名曰提頭頼吒身長二十五里及諸男女夀命多少人身長短及諸衣食皆悉同等閻浮提内一切眾生能修善行奉持三皈五戒孝敬父母供養師長奉祀三尊無有違犯者得生其中轉輪聖王所住之處亦有無量七寶宮殿去地二百萬里爾時轉輪聖王及一切羣臣眷屬皆身長二十三里夀命二十五萬𡻕衣食自然轉輪聖王及諸王子一切皆乘七寶大轝游四天下教化一切眾生有能奉持三皈五戒修行十善不犯諸惡受持讀誦妙法蓮華經隨心所願得生其中亦有無量七寶宮殿男女身長二十五里夀命二十五萬𡻕衣食自然無所乏少須彌山上名忉利天此天第一夀命一劫其中天人身長二十五里一切皆受無量快樂衣食自然閻浮提内諸眾生眾有能奉持三皈五戒十善勤行精修供養諸仙受持誦念妙法蓮華經晝夜一心護持經戒淸淨俱足無違失者盡其夀命隨意所願得生其中其第二天夀命二劫衣食自然其中亦有男女身長二十五里受持五戒十善得生其中其第三天夀命四劫衣食自然其中亦有男女身長二十五里受持五戒十善得生其中其第四天夀命八劫衣食自然其中亦有男女身長二十五里受持五戒十善得生其中其第五天夀命一十六劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第六天夀命三十二劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第七天夀命六十四劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第八天夀命一百二十八劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第九天夀命二百五十六劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十天夀命五百一十二劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十一天夀命一千二十四劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十二天夀命二千四十八劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十三天夀命四千九十六劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十四天夀命八千一百九十二劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十五天夀命一萬劫衣食自然其中亦有男女身長二十里受持五戒十善得生其中其第十六天夀
