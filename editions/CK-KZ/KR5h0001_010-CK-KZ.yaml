front:
  text: 六度行淸淨空寂卽無趣
  hash: sha256:033867be4513e15788137ec3f57d66eea6f04cb61a457a5762435cc82bfb7c13
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0001_CK-KZ_01p026a, image: JY019/CK-KZ_JY019_01p026a.png}
body:
  text: 眾善悉皆修諸山無别故别法各空寂四種凡諸行教化諸眾行天人亦讚說諸法皆平等一切生道智平等當自是道法天流値廣究災祥品第十七爾時元始天尊在七寶林中演說諸大妙法時有太極眞人太玄眞人普法眞人太乙眞人定光眞人妙光眞人寶積眞人普德眞人妙行眞人玄一眞人惠命眞人救苦眞人溥度眞人普平眞人溥濟眞人自在眞人普觀眞人溥心眞人太虛眞人大力眞人東方提頭賴吒天王南方毗留勒义天王西方毗樓愽义天王北方毗沙門天王轉輪聖王四海龍王須彌山王諸天神王大風神王大火神王大上神王大雲神王大雷神王大電神王大力神王大月神王大星神王小星神王小日神王小月神王飛天神王宮殿神王觀廟神王社稷神王各與眷屬無鞅數眾悉皆來集稽首朝禮上白天尊曰臣等昔觀天地一切世界日月星宿山川巖洞金璧土石並皆混合廓明幽默時和嵗豐國安民富受生快樂苦病不興觀今俗澆民病多受貧窮夭折父子男女不忠不孝不義不仁常遭饑饉病難每加古今異殊未能曉悟敢仗慈尊廣爲宣說開諭愚迷其有羅網牧獵禽獸殺害眾生慳悋財貨不能施惠輕疎父母重惜妻子無有禮義淫慾迷惑心懷嫉妬意起異端旣有奉於尊經晨昏不思讀誦漏瀾損失普軸不聞天尊睿號善因豈有福祿何生此等眾生終日竟夜㝠司紀錄每遇六齋十直三元五臘三會之辰檢刮功過糾其善惡累積愆尤今受報應罪惡盈貫沉溺苦海漂浪愛河豈獨己身受殃受苦連逮九玄累及七祖幽司考較編入酆都萬劫受苦無有出期是時諸大眞人聞如是言悉皆驚怖惟願大慈特垂救度是時天尊告曰我今爲汝說此妙經濟度眾生子宜諦聽傳教世間流通讀誦塵凡若有善信學道修行持誦經典須當肅嚴衣冠不得裸露若心生别端意不淸淨有諸輕慢風吹直入倒懸地獄罪苦轉加無法可免如能念道思眞或一聲二聲尙消苦厄若能善寫三十六部尊經布於世間普勸有緣士庶善信誦持是經獲福無量有能自行善行建立觀宇布設橋梁散施穀布財寶衣物損己益他恤孤愛寡心持十戒二十四戒此乃積功累德祈福方來非今世人如是眾生恣興妖僞心生殺害偏信邪法嗜酒淫佚靡辨親疎慳貪嫉妬苟利窺圖不行布施共相爭奪不濟貧苦作諸非法廣造惡業不持戒行此等眾生心遭天譴諸惡神鬼專逐其人當令夀命短促流於貧賤五不具足於是天尊勅諸眞人護持是人去住通達無有障難是其國王后妃太子宰輔大臣萬民兆庶皆大歡喜晝夜安樂若能持心齋戒沐浴五體轉誦此法華經者百病消除千災殄散若或心生懈怠輕笑誹謗惡言妄語不信經法斯人獲無量罪報墮無間地獄若敬信諸經典者獲無量福報得生人間天上受諸快樂爾時天尊復作前義而說偈曰吾今說妙偈妙偈皆眞實一切諸眾生宜當皆信受若有不信經將墮三惡道如是諸天眞安有不歸道今見魔降伏稽首來迎請我演此偈言妙法正經典皈衣敬信人福惠常增厚爾時天尊諭諸眞人曰汝等可於閻浮國内震旦國中五百年後遣汝行化是時世中人民無善惟行殺害壯年頭白性同畜類男女短小身長尺餘不種五穀惟食草子起處悉於草下九月九日上天降災山摧石擊四海自然枯竭一切眾生𨔛相殺食大施融變草木化爲鋒刃衝着卽死骨山血池狼籍臭穢不堪附近次有熱風神王冷風神王幷諸小風神王吹其死屍聚成山嶽或一年至於十年復遭年風大王吹其諸惡散如微塵平如手掌更興大水高八十尺猶如熱湯不可附觸或經五年十年其水推出諸穢惡消泥漫大水悉成平地小水卽成溪谷水泡散生樹木之上經得小千世界還生堅硬處上處下諸餘亦爾吾當先遣金翹鳥下地遼繞擇其善惡男女或有善根厚重持此法華者當與度之免斯苦厄其有不修齋戒性躭淫慾殺盗慳貪綺言妄語惡口兩舌輕誑愚痴背親向疎誹謗聖眞不敬經典罪業積深獲無量苦報死入酆都無間地嶽萬刧受苦㝠冥長夜無有出期若有善信男女道俗儒流能談謌頌諷讚洞文琴瑟笙簫箏笛鼓鈸香花妙菓供養三寶眞仙聖眾者得獲無量福報是時西瞿耶尼當有此樂種種樂音晝夜六時有異獸靈禽風雲樹木悉皆供養曲音雅嚴北鬱單越一切眾生思詠正法衣食自然隨其快樂一旦命終離諸苦惱東弗于逮眾生修眞善法所居廟宇華堂樂音自具天尊再告眾眞曰吾今宣諭有諸逐人神鬼各宜内外思省乃有優仙樓比罹鬼遭寂失火鬼天神地神鬼山神樹神鬼五道大力鬼百怪精邪鬼吸人氣血鬼食精啖腦鬼攝人魂魄鬼詐人飲食鬼入人耳目鬼入人口鼻鬼啖人肝心鬼入人五藏鬼入人十指鬼入人三田鬼入人七竅鬼百日伏屍鬼瘟㾮疫癘鬼頭疼肚痛鬼天瘟地瘟鬼五色心舌鬼南辰北斗鬼如是天下十方一切諸鬼悉皆殺害其人若請善信男女能持此法華經者滅除眾鬼惡魔邪魅末刧生世之人超於大羅天宮乃有一切神王擁護是人不令中夭橫死諸餘惡鬼悉皆消滅見世安樂寢無惡夢公私遂意萬願從心如上因緣功德道備南閻浮提眾生智性慵鄙背正向邪固負聖賢評量教典損他益已謟妄慳貪殺害邪淫嫉妬良善悖逆尊親積罪彌天盈惡苦地妄失修行自形勞苦其或𡻕豐時歉受賤不常天道察觀鬼魔降禍有能恭敬眞像崇奉教言佈施出家造井濟度羣情行諸十善獲福無涯况其一切眾生皆得受性安居各隨善惡淺深所報福業不等吾今示諭汝宜諦聽受持勿示非人是時諸大眞人及諸天仙聖神王等眾聞此教言皆大歡喜信受奉行稽首道前奉辭而退
