canonical_identifier: bkk:krp/KR5h0001/CK-KZ/v1/juan/4
seq: 4
front:
  text: 我說共化大地一切眾生莫歷三途或有眾生㪷秤誑妄或有眾生污慢三寶或有眾生常行偷盗人間暗毒或有眾生殺生害命或有眾生行種種不善之法卽當捨邪歸正然後僊行惠達聖前碧落天上自然快樂常聞天鼓音樂謠歌悉無暫停天人接引時復朝禮永離三途長游天界身任解脫助其道法使千萬𡻕一切會中諸天聖眾作禮而退
  hash: sha256:82eb9614bff2e9ede504a6cfb6a51197e88da38ffba304dfea7d78a8b3b430da
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0001_CK-KZ_01p007b, image: JY019/CK-KZ_JY019_01p007b.png}
body:
  text: 解脫品第七爾時元始天尊白諸天眾從昔以來未聞無上經典大千人倫我道德逍遙快樂自然乃往古時有一童子游戲諸國多諸智慧世藝無雙或入山林或居城邑與人僕使常無解怠更生歡喜常復仙歌無嗔無怒又復尋游到一小國遇一高山四顧雲霞綠水橫流爾時童子乃止此山朝飡松柏暮宿岩谷日往月來常誦妙經時有白鶴從空而下童子與鶴成伴又經數百年間天童玉女從空來迎當會元君成道歸正是時童子無慳貪嫉妬五毒之心又復成仙下游世界除妖毒之精救度人民除其疾病當行如是爾時仙子卽我身也復告天眾我觀下界人民不修十善道我當化度未成仙道在世界中不免輪迴如暘艷如水聚如葩蕉如石火化人如風中燭如蕉穀芽如夢幻影如石火久住如電光常照如煩惱形今正是時諸仙成道更自思惟玉女金童遙空駕羽三山來去璚臺紫府碧落空歌日月光中常游杳㝠無極九品上卿眞人無極上品流霞眞人無極妙品左玄眞人與我同生常居天界共談下方惡業眾生不修妙法終無解脫教量品第八爾時元始天尊白諸天眾譬如大海容諸小海無復盈溢今諸天眾化彼羣迷是時下方眾生人民勿生懈倦日夜精勤誦無量妙經千萬億遍觀心如空更施妙術現種種變化身長萬丈頭住於天足履大海興雲致雨脚下出水頭上出火頭上出水脚下出火現如是神通皆以教化若人重病自化良醫若人枷禁自化解脫若人在於嶮路自化人引若人沒於江湖自化舟船若人遇於鬼精之害自化除魅一切排空飛龍走騎散彩璚臺種種蕭歌能令天人聞之地獄停酸諸鬼之精遠藏他方爾時會中有一妙行眞人卽說偈曰重空天花滿卽超法會來是彼天人化法雨潤長空鶴隨丹殿舞鳳鳴隱洞前一切靈空瑞無鞅數以來玉女金童侍流霞耀紫虛眾歌碧落臺歩虛元君勅令救眾生苦時有下方聞學道諸仙子大誓集無爲持經深洞裏學術古臺中現行世界外未達妙經玄
  hash: sha256:cd43f1e7b3a794e58b95d0a998cd845a3989ec6ffdb440b3572e3409b735f42d
