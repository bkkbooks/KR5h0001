front:
  text: 太上中道妙法蓮華經卷之三
  hash: sha256:9fba9b5f59d2e2d534b10957bf31b0bc70b01a0588329af54290a4ee158357c0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0001_HFL_003-001a, image: hfl/1058/1058-018.png}
body:
  text: 順行正品第五爾時元始天尊集會天仙及諸化仙從無鞅世界而來各禮天尊于一面坐時有左玄真人上白天尊曰惟願天尊大慈愍我等故說斯妙經今乃化仙皆來集會時久行者願得天尊慈悲所諭是時天尊告諸天尊衆諸天仙衆我成道以來未聞斯經上得逍遙今汝聽受願超我故即說偈曰我當化度救彼三途一切諸仙盡成道故千萬億夕住虛空所化出瓊台碧落雲衢天歌自然鸞鳴鳳舞化出異香雲間結輿逰繞世界停地獄苦無憂無惱如飲甘露大道所生神仙扶助令使解脫邪心頓悟免被輪回永絶三途行平等心我唯濟苦六根常淨千邪當去無礙智慧長生自布道垂遠喻衆生親負於解脫時達神仙路清淨快樂行慈法雨救衆生病恆歌妙語垂喻品第六爾時元始天尊白諸天衆說海空之義使無鞅數衆神通自然我說黃庭左玄當我我說幽玄右玄解我我說無為尹喜為侣我說長生齊天命住散落人間為大醫父我有妙經能令衆生得超九品是時天尊以偈讚曰或有諸仙子住於深洞中修心鍊丹藥以求大道玄或有諸仙子處如塵世界化現無礙惠以求大道玄或有諸仙子現行染妙法救于衆生者以求大道玄或有諸仙子坐于東海隅千萬餘年中以求大道玄或有諸仙子多聞智過人强識于文字以求大道玄或有諸仙子休糧服松柏彈琴氷心火以求大道玄或有諸仙子持劍於荒郊降伏十種魔以求大道玄或有諸仙子符禁咒術功除殃遣鬼魔以求大道玄或有諸仙子海上駕青鸞度運歸仙道以求大道玄或有諸仙子持經念洞章救彼凡夫者以求大道玄是時元始天尊說偈讚已于是會中有無極天尊我聞斯經九玄七祖咸升天宫何况一切受苦衆生豈不超然乃有五無間無鞅之苦如赫日消霜咸使盲聾便獲聰明咸使貧窮便獲富貴咸使顛狂便獲真性咸使下貧便獲高遷咸使重病便獲痊瘥咸使喑啞便獲能言咸使目盲便獲光明咸使蹇足便獲能行咸使孕婦便獲身輕咸使淫欲便獲離淫咸使愚癡便獲離癡咸使瞋恚便獲離瞋咸使五濁便獲男形咸使死尸便獲生成咸使精邪便獲遠奔咸使虛耗便獲豐足咸使賊盜便獲慈悲咸使饑饉便獲飽滿咸使火災便獲息焰咸使水災便獲平陸是時天尊告諸天仙衆我昔求於大道時有五方人來各說空界異口同音我指大道聲振十方鬼神之驚又聞上界往昔天人所說大道變現無窮乃有衆生求其大道我當助道速得成就爾時大衆動已自然音樂于空中來迎能修道果無復憎愛愚癡驕慢多嗔恚怒輕觸邪淫忘言惡口行無礙惠濟貧救苦時有長壽真人上白天尊言願我早成大道爾時天尊為我說法從生以來未聞斯經以得清淨今願天尊重為我說共化大地一切衆生莫歷三途或有衆生㪷稱誑妄或有衆生污慢三寶或有衆生常行偷盜人間暗毒或有衆生殺生害命或有衆生行種種不善之法即當捨邪歸正然後仙行惠達聖前碧落天上自然快樂常聞天鼓音樂謡歌悉無暫停天人於引時復朝禮永離三途長遊天界身任解脫助其道法使千萬歲一切會中諸天聖衆作禮而退卷之三終
